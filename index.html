<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meine Favoriten</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./themes.css">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <style>
    .panel-actions { white-space: nowrap; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .panel-actions > * { flex: 0 0 auto; }
  </style>
</head>
<body>
  <main>
    <header class="page-header" style="justify-content:space-between;align-items:center;">
      <div style="display:flex;align-items:baseline;gap:0.85rem;flex-wrap:wrap;">
        <h1 class="headerClass">Favoriten</h1>
        <p class="intro">der regelmäßig besuchten Seiten</p>
      </div>
      <div class="scheme-switcher" role="group" aria-label="Farbschema wählen">
        <button class="swatch swatch--blue" data-theme="blue" title="Blau" aria-pressed="false"></button>
        <button class="swatch swatch--green" data-theme="green" title="Grün" aria-pressed="false"></button>
        <button class="swatch swatch--red" data-theme="red" title="Rot" aria-pressed="false"></button>
        <button class="swatch swatch--purple" data-theme="purple" title="Purpur" aria-pressed="false"></button>
        <button class="swatch swatch--mono" data-theme="mono" title="Schwarz/Weiß" aria-pressed="false"></button>
        <button class="swatch swatch--light" data-theme="light" title="Hell" aria-pressed="false"></button>
      </div>
    </header>

    <section class="panel">
      <form id="linkForm" novalidate>
        <input id="titleInput" type="text" placeholder="Name">
        <input id="urlInput" type="text" placeholder="URL (z. B. https://example.com)" inputmode="url">
        <input id="categoryInput" type="text" list="categorySuggestions" placeholder="Kategorie" required>
        <datalist id="categorySuggestions"></datalist>
        <button type="submit">Hinzufügen</button>
      </form>
      <div class="panel-actions" style="display:flex; flex-wrap:wrap; gap:8px; align-items:center; min-width: max-content; white-space: nowrap;">
        <!-- Icons hinzugefügt -->
        <button id="sortCategoriesBtn" type="button" class="secondary-btn" data-tooltip="Reihenfolge der Kategorien festlegen">↕️ Kategorien sortieren</button>
        <button id="exportBtn" type="button" class="secondary-btn" data-tooltip="Alle Favoriten als JSON-Datei herunterladen">⬇️ Export</button>
        <button id="importBtn" type="button" class="secondary-btn" data-tooltip="Favoriten aus einer JSON-Datei einspielen oder zusammenführen">⬆️ Import</button>
        <button id="toggleStatsBtn" type="button" class="secondary-btn" data-tooltip="Besuchsstatistik aller Links ein-/ausblenden">📊 Statistik</button>
        <button id="resetStatsBtn" type="button" class="secondary-btn" data-tooltip="Alle Besuchszähler auf 0 zurücksetzen">🔄 Zähler reset</button>
        <label class="secondary-btn" style="display:inline-flex;align-items:center;gap:6px;" data-tooltip="Änderungen automatisch als JSON-Backup speichern">
          Auto-Export
          <input id="autoExportToggle" type="checkbox" checked>
        </label>
        <label class="secondary-btn" style="display:inline-flex;align-items:center;gap:6px;" data-tooltip="Kacheln innerhalb der Kategorie nach der Besuchsanzahl sortieren">
          Häufigkeit
          <input id="sortByFreqToggle" type="checkbox">
        </label>
        <a class="secondary-btn help-btn" href="./BEDIENUNGSANLEITUNG.pdf" target="_blank" rel="noopener noreferrer" data-tooltip="Bedienungsanleitung anzeigen">❓ Hilfe</a>
        <input id="importFileInput" type="file" accept="application/json,.json" hidden>
      </div>
    </section>

    <div class="search-bar">
      <input id="searchInput" type="search" placeholder="Favoriten durchsuchen …" aria-label="Favoriten durchsuchen">
    </div>

    <section id="tilesContainer" aria-live="polite"></section>

    <footer class="app-version" aria-label="Programmversion">
      Version 1.1 vom 10.05.2026 / &copy; MD. 2026
    </footer>
  </main>

  <dialog id="editDialog" class="edit-dialog" aria-labelledby="editDialogTitle">
    <form id="editForm" class="edit-form" method="dialog">
      <h3 id="editDialogTitle">Kachel bearbeiten</h3>
      <input id="editTitleInput" type="text" placeholder="Titel" required>
      <input id="editUrlInput" type="url" placeholder="URL" required>
      <input id="editCategoryInput" type="text" list="categorySuggestions" placeholder="Kategorie" required>
      <div class="edit-actions">
        <button type="button" id="editCancelBtn" class="secondary-btn">Abbrechen</button>
        <button type="submit">Speichern</button>
      </div>
    </form>
  </dialog>

  <dialog id="sortCategoriesDialog" class="sort-categories-dialog" aria-labelledby="sortCategoriesDialogTitle">
    <form id="sortCategoriesForm" class="sort-categories-form" method="dialog">
      <h3 id="sortCategoriesDialogTitle">Kategorien sortieren</h3>
      <div id="sortCategoriesList" class="sort-categories-list" aria-live="polite"></div>
      <div class="sort-actions">
        <button type="button" id="sortCategoriesCancelBtn" class="secondary-btn">Abbrechen</button>
        <button type="submit">Speichern</button>
      </div>
    </form>
  </dialog>

  <script src="./app.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const searchInput = document.getElementById('searchInput');
      if (searchInput) {
        searchInput.focus();
      }

      const title = document.querySelector('.headerClass');
      if (title) {
        title.addEventListener('click', () => {
          const a = document.createElement('a');
          a.href = 'Favoriten-Manager.mp4';
          a.target = '_blank';
          a.rel = 'noopener';
          a.style.display = 'none';
          document.body.append(a);
          a.click();
          a.remove();
        });
      }
    });
  </script>

</body>
</html>
